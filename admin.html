<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 پنل مدیریت - پیوند مودَّت</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .page-header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .page-header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
        }
        .page-header h1 span {
            color: #4fc3f7;
        }
        .page-header .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-header .header-actions button {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }
        .page-header .header-actions button:hover {
            background: #81d4fa;
            transform: scale(1.03);
        }
        .page-header .header-actions button.back-btn {
            background: #D4818A;
            color: #fff;
        }
        .page-header .header-actions button.back-btn:hover {
            background: #c06a73;
        }

        .admin-login {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .admin-login label {
            color: #ccc;
            font-weight: bold;
            font-size: 15px;
        }
        .admin-login input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            font-size: 14px;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transition: 0.3s;
        }
        .admin-login input:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2);
        }
        .admin-login input::placeholder {
            color: #888;
        }
        .admin-login button {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 12px 35px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }
        .admin-login button:hover {
            background: #81d4fa;
            transform: scale(1.02);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stats-row .stat-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.3s;
        }
        .stats-row .stat-card:hover {
            border-color: #4fc3f7;
            transform: translateY(-3px);
        }
        .stats-row .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #4fc3f7;
        }
        .stats-row .stat-card .label {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        .filter-area {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .filter-area .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-area .filter-buttons button {
            padding: 10px 22px;
            border: 2px solid rgba(79, 195, 247, 0.3);
            border-radius: 40px;
            background: transparent;
            color: #4fc3f7;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }
        .filter-area .filter-buttons button:hover,
        .filter-area .filter-buttons button.active {
            background: #4fc3f7;
            color: #1a1a2e;
        }
        .filter-area .filter-buttons button.clear-btn {
            border-color: #D4818A;
            color: #D4818A;
        }
        .filter-area .filter-buttons button.clear-btn:hover {
            background: #D4818A;
            color: #fff;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 22px 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.3s;
            color: #eee;
        }
        .admin-card:hover {
            border-color: #4fc3f7;
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .admin-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .admin-card .card-header .name {
            font-size: 20px;
            font-weight: bold;
            color: #4fc3f7;
        }
        .admin-card .badge {
            background: #4fc3f7;
            color: #1a1a2e;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }
        .admin-card .badge.duplicate {
            background: #C5A200;
            color: #fff;
        }

        .admin-card .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 4px 20px;
            font-size: 13px;
            color: #ccc;
            line-height: 2;
        }
        .admin-card .info-grid strong {
            color: #fff;
        }
        .admin-card .info-grid .full {
            grid-column: 1 / -1;
        }

        .admin-card .card-footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #888;
            flex-wrap: wrap;
            gap: 5px;
        }

        .no-result {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #888;
        }
        .no-result .icon {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
        }

        .loading-area {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #888;
        }
        .loading-area .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            .page-header { padding: 18px 20px; flex-direction: column; text-align: center; }
            .page-header h1 { font-size: 22px; }
            .admin-card .info-grid { grid-template-columns: 1fr; }
            .filter-area { flex-direction: column; }
            .admin-login { flex-direction: column; }
            .admin-login input { width: 100%; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
            .page-header .header-actions button { width: 100%; }
            .filter-area .filter-buttons { width: 100%; }
            .filter-area .filter-buttons button { flex: 1; text-align: center; font-size: 12px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="page-header">
        <h1>🔐 پنل <span>مدیریت</span></h1>
        <div class="header-actions">
            <button onclick="location.href='index.html'" class="back-btn">🏠 بازگشت</button>
        </div>
    </div>

    <!-- ===== ورود ادمین (بدون نمایش رمز) ===== -->
    <div class="admin-login" id="loginArea">
        <label>🔑 رمز ادمین:</label>
        <input type="password" id="adminPasswordInput" placeholder="رمز را وارد کنید...">
        <button id="verifyAdminBtn">ورود به پنل</button>
    </div>

    <div id="adminPanel" class="hidden">

        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="number" id="totalUsers">0</div>
                <div class="label">👤 کل کاربران</div>
            </div>
            <div class="stat-card">
                <div class="number" id="maleCount">0</div>
                <div class="label">👨 مردان</div>
            </div>
            <div class="stat-card">
                <div class="number" id="femaleCount">0</div>
                <div class="label">👩 زنان</div>
            </div>
            <div class="stat-card">
                <div class="number" id="decadeCount">0</div>
                <div class="label">📅 دهه‌های مختلف</div>
            </div>
        </div>

        <div class="filter-area">
            <div class="filter-buttons">
                <button class="active" data-decade="همه" onclick="setDecade('همه')">همه</button>
                <button data-decade="دهه چهل و پنجاه" onclick="setDecade('دهه چهل و پنجاه')">دهه ۴۰ و ۵۰</button>
                <button data-decade="دهه شصت" onclick="setDecade('دهه شصت')">دهه ۶۰</button>
                <button data-decade="دهه هفتاد" onclick="setDecade('دهه هفتاد')">دهه ۷۰</button>
                <button data-decade="دهه هشتاد" onclick="setDecade('دهه هشتاد')">دهه ۸۰</button>
                <button data-decade="سایر" onclick="setDecade('سایر')">سایر</button>
            </div>
        </div>

        <div id="adminDataArea" class="admin-grid">
            <div class="loading-area">
                <div class="spinner"></div>
                در حال بارگذاری اطلاعات...
            </div>
        </div>

    </div>

</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzM9ZY5Ho0PYu6o_3qBROcPu7z4hc-TDAz-ABX62cc_4ICHKBBNn_Tb5U8uBeTGIES/exec";
    const ADMIN_PASSWORD = "admin1357";

    let allUsers = [];
    let currentDecade = 'همه';
    let isLoggedIn = false;

    function showMessage(msg, isError = false) {
        const div = document.getElementById('messageArea') || document.createElement('div');
        if (!document.getElementById('messageArea')) {
            div.id = 'messageArea';
            document.querySelector('.container').insertBefore(div, document.getElementById('loginArea'));
        }
        div.innerHTML = `<div style="background:${isError ? 'rgba(255,0,0,0.15)' : 'rgba(79,195,247,0.15)'}; color:${isError ? '#ff6b6b' : '#4fc3f7'}; padding:12px 20px; border-radius:20px; margin-bottom:20px; text-align:center; font-weight:bold; border:1px solid ${isError ? 'rgba(255,0,0,0.2)' : 'rgba(79,195,247,0.2)'};">${msg}</div>`;
        setTimeout(() => div.innerHTML = '', 5000);
    }

    async function loadFromSheet() {
        try {
            const res = await fetch(SCRIPT_URL);
            if (!res.ok) throw new Error('خطا در ارتباط با سرور');
            const data = await res.json();
            allUsers = Array.isArray(data) ? data : [];
            updateStats();
            renderAdminData(currentDecade);
        } catch(e) {
            document.getElementById('adminDataArea').innerHTML = `
                <div class="loading-area" style="grid-column:1/-1;">
                    ❌ خطا در ارتباط با سرور
                </div>
            `;
        }
    }

    function updateStats() {
        const total = allUsers.length;
        const males = allUsers.filter(u => u.gender === 'مرد').length;
        const females = allUsers.filter(u => u.gender === 'زن').length;
        const decades = new Set(allUsers.map(u => u.decade).filter(Boolean));

        document.getElementById('totalUsers').textContent = total;
        document.getElementById('maleCount').textContent = males;
        document.getElementById('femaleCount').textContent = females;
        document.getElementById('decadeCount').textContent = decades.size;
    }

    function renderAdminData(decade) {
        const container = document.getElementById('adminDataArea');
        let filtered = decade === 'همه' ? allUsers : allUsers.filter(u => u.decade === decade);

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="no-result" style="grid-column:1/-1;">
                    <span class="icon">📭</span>
                    هیچ کاربری در این دهه ثبت‌نام نکرده است
                </div>
            `;
            return;
        }

        let html = '';
        filtered.forEach((user, index) => {
            const badgeClass = user.decade === 'سایر' ? 'duplicate' : '';
            const genderIcon = user.gender === 'مرد' ? '👨' : user.gender === 'زن' ? '👩' : '👤';

            html += `
                <div class="admin-card">
                    <div class="card-header">
                        <span class="name">${genderIcon} ${user.fullname || 'نامشخص'}</span>
                        <span class="badge ${badgeClass}">${user.decade || 'نامشخص'}</span>
                    </div>

                    <div class="info-grid">
                        <div><strong>📱 آیدی ایتا:</strong> ${user.eitaaId || '-'}</div>
                        <div><strong>📞 شماره تماس ۱:</strong> ${user.phone1 || '-'}</div>
                        <div><strong>📞 شماره تماس ۲:</strong> ${user.phone2 || '-'}</div>
                        <div><strong>🚻 جنسیت:</strong> ${user.gender || '-'}</div>
                        <div><strong>📅 تولد:</strong> ${user.birthYear}/${user.birthMonth}/${user.birthDay}</div>
                        <div><strong>📏 قد/وزن:</strong> ${user.height}/${user.weight}</div>
                        <div><strong>📍 استان:</strong> ${user.province || '-'}</div>
                        <div><strong>🏙️ شهرستان:</strong> ${user.city || '-'}</div>
                        <div><strong>🏘️ محله:</strong> ${user.neighborhood || '-'}</div>
                        <div><strong>🎓 تحصیلات:</strong> ${user.selfEducation || '-'}</div>
                        <div><strong>💼 شغل:</strong> ${user.jobType || '-'} ${user.jobDesc ? ' - ' + user.jobDesc : ''}</div>
                        <div><strong>👔 شغل پدر:</strong> ${user.fatherJob || '-'}</div>
                        <div><strong>👗 شغل مادر:</strong> ${user.motherJob || '-'}</div>
                        <div><strong>🎨 رنگ پوست/چشم:</strong> ${user.skinColor || '-'} / ${user.eyeColor || '-'}</div>
                        <div><strong>🧕 نوع پوشش:</strong> ${user.womenCover || user.dressCode || '-'}</div>
                        <div><strong>🩺 وضعیت جسمی:</strong> ${user.physicalStatus || '-'}</div>
                        ${user.disabilityDesc ? `<div class="full"><strong>📝 توضیحات معلولیت:</strong> ${user.disabilityDesc}</div>` : ''}
                        <div><strong>🚬 دخانیات:</strong> ${user.smoking || '-'}</div>
                        <div><strong>👨‍👩‍👧‍👦 تعداد خانواده:</strong> ${user.familyCount || '-'}</div>
                        <div><strong>👶 فرزند چندم:</strong> ${user.childOrder || '-'}</div>
                        <div><strong>💚 خصوصیات اخلاقی:</strong> ${user.personality || '-'}</div>
                        <div><strong>🤵 معیار همسر:</strong> ${user.spouseCriteria || '-'}</div>
                        <div><strong>💍 سابقه ازدواج:</strong> ${user.marriageHistory || '-'}</div>
                        ${user.marriageDuration ? `<div><strong>⏳ مدت زندگی مشترک:</strong> ${user.marriageDuration}</div>` : ''}
                        ${user.marriageRegistered ? `<div><strong>📄 ثبت در شناسنامه:</strong> ${user.marriageRegistered}</div>` : ''}
                        ${user.childGender ? `<div><strong>👶 جنسیت فرزند:</strong> ${user.childGender} | سن: ${user.childAge || '-'}</div>` : ''}
                        ${user.childCustody ? `<div class="full"><strong>📋 حضانت فرزند:</strong> ${user.childCustody}</div>` : ''}
                        <div><strong>🗺️ استان‌های قابل قبول:</strong> ${user.acceptProvinces || '-'}</div>
                        <div><strong>🏙️ شهرهای قابل قبول:</strong> ${user.acceptCities || '-'}</div>
                        <div><strong>💼 شغل ایده‌آل همسر:</strong> ${user.spouseJobAccept || '-'}</div>
                        ${user.freeJobDesc ? `<div class="full"><strong>📝 شغل آزاد مد نظر:</strong> ${user.freeJobDesc}</div>` : ''}
                        <div><strong>📊 اختلاف سنی:</strong> ${user.ageDiff || '-'}</div>
                        <div><strong>📏 محدوده سنی:</strong> ${user.ageRange || '-'}</div>
                        <div><strong>🎓 تحصیلات همسر:</strong> ${user.minEduSpouse || '-'}</div>
                        <div><strong>💰 درآمد:</strong> ${user.income || '-'}</div>
                        <div><strong>🏠 وضعیت دارایی:</strong> ${user.assets || '-'}</div>
                        ${user.assetsDesc ? `<div class="full"><strong>📝 توضیح دارایی:</strong> ${user.assetsDesc}</div>` : ''}
                        <div class="full"><strong>📝 توضیحات تکمیلی:</strong> ${user.moreInfo || '-'}</div>
                        <div><strong>📱 آیدی روبیکا:</strong> ${user.rubikaId || '-'}</div>
                        <div><strong>📱 آیدی بله:</strong> ${user.baleId || '-'}</div>
                        <div><strong>📱 آیدی سروش:</strong> ${user.soroushId || '-'}</div>
                        <div><strong>📞 نحوه ارتباط:</strong> ${user.contactMethod || '-'}</div>
                        ${user.agentPhone ? `<div><strong>📞 شماره رابط:</strong> ${user.agentPhone}</div>` : ''}
                        ${user.agentId ? `<div><strong>🆔 آیدی رابط:</strong> ${user.agentId}</div>` : ''}
                    </div>

                    <div class="card-footer">
                        <span>🕐 ${user.timestamp || ''}</span>
                        <span>#${index + 1}</span>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    function setDecade(decade) {
        if (!isLoggedIn) {
            showMessage('❌ لطفاً ابتدا وارد پنل ادمین شوید', true);
            return;
        }
        currentDecade = decade;
        document.querySelectorAll('.filter-area .filter-buttons button').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelector(`.filter-area .filter-buttons button[data-decade="${decade}"]`)?.classList.add('active');
        renderAdminData(currentDecade);
    }

    document.getElementById('verifyAdminBtn').addEventListener('click', async function() {
        const pass = document.getElementById('adminPasswordInput').value;
        if (pass !== ADMIN_PASSWORD) {
            showMessage('❌ رمز ادمین اشتباه است!', true);
            return;
        }
        isLoggedIn = true;
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('loginArea').style.display = 'none';
        showMessage('✅ ورود موفق - اطلاعات کامل کاربران نمایش داده شد');
        await loadFromSheet();
    });

    document.getElementById('adminPasswordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('verifyAdminBtn').click();
        }
    });
</script>

</body>
</html>
